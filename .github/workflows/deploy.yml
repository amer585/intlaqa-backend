name: Deploy to Gigalixir

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Deploy to Gigalixir
        run: |
          ENCODED_EMAIL=$(echo "${{ secrets.GIGALIXIR_EMAIL }}" | sed 's/@/%40/g')
          git remote add gigalixir https://${ENCODED_EMAIL}:${{ secrets.GIGALIXIR_API_KEY }}@git.gigalixir.com/madrastna-backend.git
          git push gigalixir main -f
